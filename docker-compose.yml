services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flappapp
      POSTGRES_PASSWORD: flappapp
      POSTGRES_DB: flappapp
    ports:
      - "5432:5432"
    volumes:
      - flappapp-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flappapp"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: dev-meili-master-key
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - flappapp-meili:/meili_data

volumes:
  flappapp-pg:
  flappapp-meili:
